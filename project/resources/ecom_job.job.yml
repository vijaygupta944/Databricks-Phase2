resources:
  jobs:
    ecom_pipeline:
      name: ecom_pipeline

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ${workspace.file_path}/src/Bronze
            base_parameters:
              env: ${bundle.target}
            source: WORKSPACE
          environment_key: default

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ${workspace.file_path}/src/Silver
            base_parameters:
              env: ${bundle.target}
            source: WORKSPACE
          environment_key: default

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ${workspace.file_path}/src/Gold
            base_parameters:
              env: ${bundle.target}
            source: WORKSPACE
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"

      queue:
        enabled: true
